<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tool — Dashboard AI Worx</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --card: #1c1c1c;
    --border: #2a2a2a;
    --border-strong: #3a3a3a;
    --text: #ececec;
    --text-dim: #9aa5b1;
    --text-faint: #6a7280;
    --brand-red:    #ED1A3A;
    --brand-yellow: #FDB913;
    --ok:      #4ade80;
    --danger:  #f87171;
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "DM Sans", system-ui, sans-serif;
    font-size: 14px;
    height: 100%;
    overflow: hidden;
  }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #262626; border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: #333; }

  .app {
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .head {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .name {
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.2px;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11.5px;
    font-weight: 500;
    background: rgba(253, 185, 19, 0.10);
    color: var(--brand-yellow);
    border: 1px solid rgba(253, 185, 19, 0.35);
  }
  .pill.ok    { background: rgba(74, 222, 128, 0.10);  color: var(--ok);     border-color: rgba(74, 222, 128, 0.35); }
  .pill.error { background: rgba(248, 113, 113, 0.10); color: var(--danger); border-color: rgba(248, 113, 113, 0.35); }
  .pill.idle  { background: rgba(106, 114, 128, 0.10); color: var(--text-faint); border-color: rgba(106, 114, 128, 0.35); }
  .pill .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: currentColor;
    box-shadow: 0 0 6px currentColor;
  }
  .pill.running .dot { animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }

  .clock {
    font-family: "DM Mono", ui-monospace, monospace;
    font-size: 12px;
    color: var(--text-faint);
    min-width: 56px;
    text-align: right;
  }

  .body {
    flex: 1;
    overflow-y: auto;
    overflow-x: auto;
    padding: 14px 18px 18px 18px;
    font-family: "DM Mono", ui-monospace, monospace;
    font-size: 12.5px;
    line-height: 1.55;
    color: #c7c7c7;
    white-space: pre-wrap;
    word-break: break-all;
    background: rgba(9, 9, 9, 0.97);
  }
  .body .prompt    { color: var(--brand-yellow); }
  .body .exit-ok   { color: var(--ok); }
  .body .exit-error{ color: var(--danger); }
  .body .empty {
    color: var(--text-faint);
    font-style: italic;
  }

  .foot {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 18px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }
  .foot .hint {
    flex: 1;
    color: var(--text-faint);
    font-size: 11.5px;
  }

  .btn {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 6px 14px;
    font-family: inherit;
    font-size: 12.5px;
    cursor: pointer;
    transition: 130ms;
  }
  .btn:hover:not(:disabled) {
    border-color: var(--border-strong);
    background: #222;
  }
  .btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }
  .btn.danger {
    border-color: rgba(248, 113, 113, 0.45);
    color: var(--danger);
  }
  .btn.danger:hover:not(:disabled) {
    background: rgba(248, 113, 113, 0.10);
  }

  .toast {
    position: fixed;
    right: 16px;
    bottom: 60px;
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border-strong);
    padding: 9px 14px;
    border-radius: var(--radius-sm);
    font-size: 12.5px;
    z-index: 50;
    opacity: 0;
    transform: translateY(8px);
    transition: 200ms;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { border-color: rgba(248, 113, 113, 0.55); color: var(--danger); }
</style>
</head>
<body>
<div class="app">
  <div class="head">
    <span class="name" id="toolName">Tool</span>
    <span class="pill running" id="statusPill"><span class="dot"></span><span id="statusText">Loopt</span></span>
    <span class="clock" id="clock">00:00</span>
  </div>
  <div class="body" id="logBody"><span class="empty">Wachten op output…</span></div>
  <div class="foot">
    <span class="hint">Sluiten stopt de tool niet — gebruik <strong>Stop</strong> daarvoor.</span>
    <button class="btn" id="btnExternal" title="Open dezelfde tool in een echte cmd-console (voor scripts die een TTY nodig hebben)">Open in echte console</button>
    <button class="btn danger" id="btnStop">Stop</button>
    <button class="btn" id="btnClose">Sluit venster</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
(function () {
  "use strict";

  // ----- read URL params -----
  function param(name) {
    var m = new RegExp("[?&]" + name + "=([^&]+)").exec(window.location.search || "");
    return m ? decodeURIComponent(m[1]) : "";
  }
  var JOB_ID = param("job");
  var AUTH_TOKEN = param("token");
  var TOOL_NAME = param("name") || "Tool";

  document.title = TOOL_NAME + " — Dashboard AI Worx";
  document.getElementById("toolName").textContent = TOOL_NAME;

  if (!JOB_ID || !AUTH_TOKEN) {
    document.getElementById("logBody").innerHTML =
      '<span class="exit-error">Pop-up zonder geldige job/token-parameters geopend.</span>';
    setStatus("error", "Fout");
    return;
  }

  // ----- RPC (mirrors ui.html) -----
  function rpc(method, args) {
    return fetch("/api/" + encodeURIComponent(method), {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-Auth": AUTH_TOKEN,
      },
      body: JSON.stringify(args || []),
      cache: "no-store",
    }).then(function (r) {
      if (!r.ok) {
        return r.json().then(
          function (j) { return Promise.reject(new Error(j && j.error ? j.error : r.statusText)); },
          function ()  { return Promise.reject(new Error("HTTP " + r.status)); }
        );
      }
      return r.json();
    });
  }

  // ----- helpers -----
  function $(id) { return document.getElementById(id); }
  function esc(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }
  function fmtClock(sec) {
    if (sec == null || !isFinite(sec)) return "00:00";
    var s = Math.floor(sec);
    var m = Math.floor(s / 60);
    s = s % 60;
    return (m < 10 ? "0" : "") + m + ":" + (s < 10 ? "0" : "") + s;
  }
  function setStatus(kind, text) {
    var pill = $("statusPill");
    pill.classList.remove("running", "ok", "error", "idle");
    pill.classList.add(kind);
    $("statusText").textContent = text;
  }
  var toastTimer = null;
  function toast(msg, kind) {
    var t = $("toast");
    t.textContent = msg;
    t.className = "toast show" + (kind === "error" ? " error" : "");
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () {
      t.className = "toast" + (kind === "error" ? " error" : "");
    }, 2800);
  }

  // ----- log render -----
  var lines = [];
  function appendLines(newLines) {
    if (!newLines || !newLines.length) return;
    var body = $("logBody");
    var atBottom = body.scrollTop + body.clientHeight >= body.scrollHeight - 12;
    if (lines.length === 0) {
      body.innerHTML = "";  // clear "Wachten op output…" placeholder
    }
    Array.prototype.push.apply(lines, newLines);
    // Cap client buffer.
    if (lines.length > 8000) lines = lines.slice(-4000);
    var html = "";
    newLines.forEach(function (line) {
      var cls = "";
      if (line.indexOf("$ ") === 0 && lines.length === newLines.length) cls = "prompt";
      else if (line.indexOf("[proces be") === 0) {
        cls = (currentExitCode === 0) ? "exit-ok" : "exit-error";
      }
      html += cls
        ? '<span class="' + cls + '">' + esc(line) + '</span>\n'
        : esc(line) + '\n';
    });
    // Re-render full buffer if we trimmed; otherwise append.
    if (lines.length > 4000 && lines.length === newLines.length) {
      body.innerHTML = html;
    } else {
      body.insertAdjacentHTML("beforeend", html);
    }
    if (atBottom) body.scrollTop = body.scrollHeight;
  }

  // ----- polling loop -----
  var nextOffset = 0;
  var currentExitCode = null;
  var running = true;
  var pollTimer = null;

  function poll() {
    rpc("get_job", [JOB_ID, nextOffset]).then(function (res) {
      if (!res || !res.ok) {
        setStatus("error", "Onbekende job");
        if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
        return;
      }
      currentExitCode = res.exit_code;
      $("clock").textContent = fmtClock(res.elapsed);
      if (res.log && res.log.length) appendLines(res.log);
      if (res.next_offset != null) nextOffset = res.next_offset;

      var wasRunning = running;
      running = !!res.running;

      if (running) {
        setStatus("running", "Loopt");
        $("btnStop").disabled = false;
      } else if (wasRunning) {
        // Just-finished transition. The JobRunner appends the
        // "[proces beëindigd, exit code N]" sentinel AFTER proc.wait()
        // returns, so by the time we see running=false the full log
        // is already in the buffer. Stop polling.
        $("btnStop").disabled = true;
        if (res.stopped_by_user) {
          setStatus("idle", "Gestopt");
        } else if (res.exit_code === 0) {
          setStatus("ok", "OK");
        } else {
          setStatus("error", "Fout (exit " + res.exit_code + ")");
        }
        if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
      }
    }, function (err) {
      // Network/server error — back off but don't kill the UI.
      console.warn("poll error", err);
    });
  }

  // ----- buttons -----
  $("btnStop").addEventListener("click", function () {
    if (!running) return;
    rpc("stop_job", [JOB_ID]).then(function (res) {
      if (res && res.ok) toast("Stop-signaal verstuurd.");
      else toast((res && res.error) || "Kon niet stoppen.", "error");
    });
  });
  $("btnClose").addEventListener("click", function () {
    window.close();
  });
  $("btnExternal").addEventListener("click", function () {
    rpc("relaunch_externally", [JOB_ID]).then(function (res) {
      if (res && res.ok) toast("Geopend in echte console.");
      else toast((res && res.error) || "Kon niet openen in nieuwe console.", "error");
    });
  });

  // ----- start -----
  poll();
  pollTimer = setInterval(poll, 400);
})();
</script>
</body>
</html>
